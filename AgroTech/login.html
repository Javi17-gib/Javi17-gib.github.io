<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | AgroTech Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <!-- PANEL IZQUIERDO -->
        <div class="auth-left">
            <img src="agro.png" class="logo">
            <h2>AgroTech</h2>
            <p>Plataforma inteligente para gestión agrícola</p>
        </div>

        <!-- PANEL DERECHO -->
        <div class="auth-right">

            <div class="form-toggle">
                <button id="loginBtn" class="active">Iniciar Sesión</button>
                <button id="registerBtn">Registrarse</button>
            </div>

            <!-- LOGIN -->
            <form id="loginForm" class="form active-form">

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>

                <div class="input-group password-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" required>
                    <span class="toggle-pass">👁</span>
                </div>

                <button type="submit" class="btn-primary">
                    Iniciar Sesión
                </button>

            </form>

            <!-- REGISTRO -->
            <form id="registerForm" class="form">

                <div class="input-group">
                    <label>Nombre completo</label>
                    <input type="text" id="registerName" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" required>
                </div>

                <div class="input-group password-group">
                    <label>Contraseña</label>
                    <input type="password" id="registerPassword" required>
                    <span class="toggle-pass">👁</span>
                </div>

                <button type="submit" class="btn-primary">
                    Crear Cuenta
                </button>

            </form>

        </div>

    </div>

</div>

<script src="login.js"></script>
</body>
</html>
