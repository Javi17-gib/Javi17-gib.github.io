<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | AgroTech Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/login.css">
</head>
<body>

<header>
    <div class="logo-header">
        <img src="/img/agro.png" alt="AgroTech Logo">
        <h1>AgroTech</h1>
    </div>
    <nav>
        <a href="/html/index.html">Inicio</a>
        <a href="#">Trazabilidad</a>
        <a href="#">Marketplace</a>
        <a href="#">Contacto</a>
    </nav>
</header>

<div class="auth-container">

    <div class="auth-card">

        <div class="auth-left">
            <img src="/img/agro.png" class="logo-main">
            <h2>Bienvenido</h2>
            <p>Plataforma inteligente para gestión agrícola moderna</p>
        </div>

        <div class="auth-right">

            <div class="form-toggle">
                <button type="button" id="loginBtn" class="active">Iniciar Sesión</button>
                <button type="button" id="registerBtn">Registrarse</button>
            </div>

            <!-- LOGIN -->
            <form id="loginForm" class="form active-form">

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="input-group password-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                    <span class="toggle-pass">👁</span>
                </div>

                <div class="login-options">
                    <label class="remember">
                        <input type="checkbox" id="rememberMe">
                        Recordarme
                    </label>
                </div>

                <button type="submit" class="btn-primary">
                    Iniciar Sesión
                </button>

            </form>

            <!-- REGISTRO -->
            <form id="registerForm" class="form">

                <div class="input-group">
                    <label>Nombre completo</label>
                    <input type="text" id="registerName" placeholder="Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="input-group password-group">
                    <label>Contraseña</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required>
                    <span class="toggle-pass">👁</span>
                </div>

                <button type="submit" class="btn-primary">
                    Crear Cuenta
                </button>

            </form>

        </div>

    </div>

</div>

<script src="/js/login.js"></script>
</body>
</html>
